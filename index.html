<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Assistente IA</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  margin: 0;
}

/*  janela estilo app */
.window {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 350px;
  background: #1e293b;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
  overflow: hidden;
}

/* 🔝 barra topo */
.topbar {
  background: #0f172a;
  padding: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
}

/* botões */
.controls span {
  margin-left: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* chat */
.chat {
  height: 300px;
  overflow-y: auto;
  padding: 10px;
  color: white;
}

.msg {
  margin-bottom: 10px;
  padding: 8px;
  border-radius: 8px;
}

.user {
  background: #2563eb;
  text-align: right;
}

.bot {
  background: #334155;
}

/* input */
.input-area {
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
}

button {
  padding: 10px;
  background: #22c55e;
  border: none;
  cursor: pointer;
}

/* escondido */
.hidden {
  display: none;
}

/* botão reabrir */
.open-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  padding: 10px 15px;
  border-radius: 20px;
  cursor: pointer;
  display: none;
}
</style>
</head>

<body>

<div id="chatWindow" class="window">

  <div class="topbar">
    <span>🤖 Assistente IA</span>

    <div class="controls">
      <span onclick="minimizar()">—</span>
      <span onclick="maximizar()">⬜</span>
      <span onclick="fechar()">✖</span>
    </div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="input-area">
    <input id="pergunta" placeholder="Digite sua pergunta..." />
    <button onclick="enviar()">Enviar</button>
  </div>

</div>

<div id="openBtn" class="open-btn" onclick="abrir()">Abrir Chat</div>

<script>
let minimizado = false;
let maximizado = false;

function adicionarMensagem(texto, tipo) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg " + tipo;
  div.innerText = texto.replace(/\n/g, "<br>");

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function enviar() {
  const input = document.getElementById("pergunta");
  const pergunta = input.value;

  // evita envio vazio
  if (!pergunta.trim()) return;

  adicionarMensagem(pergunta, "user");
  input.value = "";

  adicionarMensagem("⏳ Pensando...", "bot");

  try {
    const response = await fetch("https://rag-fastapi-a269.onrender.com/perguntar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ pergunta })
    });

    const data = await response.json();

    // remove "Pensando..."
    document.querySelector(".chat").lastChild.remove();

    if (data.erro) {
      adicionarMensagem("⚠️ " + data.erro, "bot");
    } else {
      adicionarMensagem(data.resposta, "bot");
    }

  } catch (error) {
    document.querySelector(".chat").lastChild.remove();
    adicionarMensagem("⚠️ Erro ao conectar com a API", "bot");
    console.error(error);
  }
}

/* CONTROLES */

function minimizar() {
  const chat = document.getElementById("chat");
  chat.classList.toggle("hidden");
  minimizado = !minimizado;
}

function maximizar() {
  const win = document.getElementById("chatWindow");

  if (!maximizado) {
    win.style.width = "90%";
    win.style.height = "90%";
    win.style.bottom = "5%";
    win.style.right = "5%";
  } else {
    win.style.width = "350px";
    win.style.height = "auto";
    win.style.bottom = "20px";
    win.style.right = "20px";
  }

  maximizado = !maximizado;
}

function fechar() {
  document.getElementById("chatWindow").style.display = "none";
  document.getElementById("openBtn").style.display = "block";
}

function abrir() {
  document.getElementById("chatWindow").style.display = "block";
  document.getElementById("openBtn").style.display = "none";
}
</script>

</body>
</html>
