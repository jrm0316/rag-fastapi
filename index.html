<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Assistente IA</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

.chat {
  height: 400px;
  overflow-y: auto;
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
}

.msg {
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 8px;
}

.user {
  background: #2563eb;
  text-align: right;
}

.bot {
  background: #334155;
}

.input-area {
  margin-top: 10px;
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
}

button {
  padding: 10px;
  background: #22c55e;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>🤖 Assistente IA</h2>

  <div id="chat" class="chat"></div>

  <div class="input-area">
    <input id="pergunta" placeholder="Digite sua pergunta..." />
    <button onclick="enviar()">Enviar</button>
  </div>
</div>

<script>
function adicionarMensagem(texto, tipo) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg " + tipo;
  div.innerText = texto;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function enviar() {
  const input = document.getElementById("pergunta");
  const pergunta = input.value;

  if (!pergunta) return;

  adicionarMensagem(pergunta, "user");
  input.value = "";

  adicionarMensagem("Pensando...", "bot");

  const response = await fetch("https://rag-fastapi-a269.onrender.com/perguntar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ pergunta })
  });

  const data = await response.json();

  document.querySelector(".chat").lastChild.remove();

  if (data.erro) {
    adicionarMensagem("Erro: " + data.erro, "bot");
  } else {
    adicionarMensagem(data.resposta, "bot");
  }
}
</script>

</body>
</html>
